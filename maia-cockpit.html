<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>MAÏA Cockpit — privé</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{--teal:#52b6d6;--sky:#7fd0e8;--white:#eef3ff;--muted:#9fb2da;--faint:#6a7da9;--line:rgba(150,180,230,.14)}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:Jost,system-ui,Segoe UI,sans-serif;color:var(--white);background:radial-gradient(600px 600px at 50% 44%,rgba(82,182,214,.07),transparent 70%),linear-gradient(180deg,#05080f,#0a1426);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
#splash{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:radial-gradient(600px 600px at 50% 46%,rgba(82,182,214,.06),transparent 70%),#05080f;transition:opacity .9s ease,visibility .9s}
#splash.gone{opacity:0;visibility:hidden}#splash svg{width:min(82vw,460px)}
.gate{width:min(92vw,360px);text-align:center;opacity:0;transition:opacity .8s ease .2s}
body.ready .gate{opacity:1}
.logo{width:84px;height:84px;margin:0 auto 14px}
.title{font-size:20px;font-weight:300;letter-spacing:.06em}.title b{font-weight:500}
.sub{font-size:12.5px;color:var(--muted);margin:6px 0 22px;font-weight:300}
.dots{display:flex;gap:14px;justify-content:center;margin:18px 0 22px}
.dot{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(150,180,230,.5);transition:.15s}
.dot.on{background:var(--teal);border-color:var(--teal);box-shadow:0 0 12px rgba(82,182,214,.6)}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto}
.key{cursor:pointer;font-size:22px;font-weight:300;padding:14px 0;border-radius:14px;border:1px solid var(--line);background:rgba(20,32,58,.5);transition:.15s;user-select:none}
.key:hover{border-color:rgba(120,160,230,.5);background:rgba(30,46,80,.6)}.key.act{transform:scale(.95)}
.key.fn{font-size:13px;color:var(--muted);letter-spacing:.1em}
.msg{font-size:12px;color:var(--faint);min-height:18px;margin-top:14px}.msg.err{color:#f0688a}
.shake{animation:sh .4s}@keyframes sh{0%,100%{transform:none}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.bre{transform-box:fill-box;transform-origin:center;animation:bre 3.2s ease-in-out infinite}@keyframes bre{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.82}}
.oA{transform-box:fill-box;transform-origin:center;animation:sp 13s linear infinite}.oB{transform-box:fill-box;transform-origin:center;animation:sp 21s linear infinite reverse}.oC{transform-box:fill-box;transform-origin:center;animation:sp 34s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.ring{stroke-dasharray:1000;stroke-dashoffset:1000;animation:trace 1.6s ease forwards .1s}@keyframes trace{to{stroke-dashoffset:0}}
.ist{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .5s cubic-bezier(.2,1.4,.4,1) forwards var(--d)}@keyframes pop{0%{opacity:0;transform:scale(0)}65%{opacity:1;transform:scale(1.45)}100%{opacity:1;transform:scale(1)}}
.icore{transform-box:fill-box;transform-origin:center;opacity:0;animation:ig .6s ease forwards 1.7s,bre 3.2s ease-in-out infinite 2.3s}@keyframes ig{0%{opacity:0;transform:scale(0)}70%{opacity:1;transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}
.iglow{opacity:0;animation:fin .6s forwards 1.7s}.iword{opacity:0;animation:fin .8s forwards 2.1s}.ilab{opacity:0;animation:fin .8s forwards 2.5s}@keyframes fin{to{opacity:1}}
</style></head><body>
<div id="splash"><svg viewBox="0 0 600 560" xmlns="http://www.w3.org/2000/svg"><defs>
<radialGradient id="hc" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#fff"/><stop offset=".5" stop-color="#9fe0f0"/><stop offset="1" stop-color="#52b6d6"/></radialGradient>
<radialGradient id="hg" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#52b6d6" stop-opacity=".55"/><stop offset="1" stop-color="#52b6d6" stop-opacity="0"/></radialGradient></defs>
<g class="oC"><g transform="translate(300,300)"><ellipse class="ring" rx="230" ry="88" fill="none" stroke="rgba(127,208,232,.16)" stroke-width="1.4" transform="rotate(-12)"/><g transform="rotate(-12)"><circle class="ist" style="--d:.2s" cx="230" r="6" fill="#52b6d6"/><circle class="ist" style="--d:1.4s" cx="-230" r="6" fill="#8b87f2"/></g></g></g>
<g class="oB"><g transform="translate(300,300)"><ellipse class="ring" rx="178" ry="68" fill="none" stroke="rgba(139,135,242,.15)" stroke-width="1.3" transform="rotate(-12)"/><g transform="rotate(-12)"><circle class="ist" style="--d:.5s" cx="178" r="5" fill="#2ecf8f"/><circle class="ist" style="--d:1s" cx="-178" r="5" fill="#e9c46a"/></g></g></g>
<g class="oA"><g transform="translate(300,300)"><ellipse class="ring" rx="128" ry="48" fill="none" stroke="rgba(127,208,232,.13)" stroke-width="1.2" transform="rotate(-12)"/><g transform="rotate(-12)"><circle class="ist" style="--d:.8s" cx="128" r="4.5" fill="#7fd0e8"/><circle class="ist" style="--d:1.2s" cx="-128" r="4.5" fill="#c4c0ff"/></g></g></g>
<g class="iword" fill="#eaf1ff" font-family="Jost,sans-serif" font-weight="300" font-size="120"><text x="220" y="338" text-anchor="middle">M</text><text x="278" y="338" text-anchor="middle">A</text><text x="378" y="338" text-anchor="middle">A</text></g>
<line class="iword" x1="328" y1="252" x2="328" y2="338" stroke="#eaf1ff" stroke-width="7" stroke-linecap="round"/>
<circle class="iglow" cx="328" cy="224" r="40" fill="url(#hg)"/><circle class="icore" cx="328" cy="224" r="18" fill="url(#hc)"/><circle class="icore" cx="328" cy="224" r="5.5" fill="#fff"/>
<text class="ilab" x="300" y="430" text-anchor="middle" font-family="Jost,sans-serif" font-weight="500" font-size="22" letter-spacing="11" fill="#9fe0f0">COCKPIT</text></svg></div>
<div class="gate">
  <svg class="logo" viewBox="0 0 240 240"><defs><radialGradient id="c" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#fff"/><stop offset=".5" stop-color="#9fe0f0"/><stop offset="1" stop-color="#52b6d6"/></radialGradient><radialGradient id="g" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#52b6d6" stop-opacity=".55"/><stop offset="1" stop-color="#52b6d6" stop-opacity="0"/></radialGradient></defs>
  <g class="oC"><g transform="translate(120,120)"><ellipse rx="96" ry="36" fill="none" stroke="rgba(127,208,232,.16)" stroke-width="1.1" transform="rotate(-14)"/><g transform="rotate(-14)"><circle cx="96" r="3" fill="#52b6d6"/><circle cx="-96" r="3" fill="#8b87f2"/></g></g></g>
  <g class="oB"><g transform="translate(120,120)"><ellipse rx="74" ry="28" fill="none" stroke="rgba(139,135,242,.14)" stroke-width="1" transform="rotate(-14)"/><g transform="rotate(-14)"><circle cx="74" r="2.6" fill="#2ecf8f"/><circle cx="-74" r="2.6" fill="#e9c46a"/></g></g></g>
  <circle cx="120" cy="120" r="46" fill="url(#g)"/><circle class="bre" cx="120" cy="120" r="20" fill="url(#c)"/><circle cx="120" cy="120" r="6" fill="#fff"/></svg>
  <div class="title" id="ttl">Cockpit <b>privé</b></div>
  <div class="sub" id="sub">Entre ton code</div>
  <div class="dots" id="dots"></div>
  <div class="pad" id="pad"></div>
  <div class="msg" id="msg"></div>
</div>
<script>
const TARGET="https://assistant-ia-vb.github.io/maia-cockpit-assets/maia-v1-14-1-preview.html";
const KEY="maia_cockpit_code_v1";
let len=4, buf="", first="", mode= localStorage.getItem(KEY)?"verify":"create";
const dots=document.getElementById('dots'),pad=document.getElementById('pad'),msg=document.getElementById('msg'),sub=document.getElementById('sub'),ttl=document.getElementById('ttl');
function drawDots(){dots.innerHTML='';for(let i=0;i<len;i++){const d=document.createElement('div');d.className='dot'+(i<buf.length?' on':'');dots.appendChild(d);}}
function setMode(){ if(mode==='create'){ttl.innerHTML='Choisis ton <b>code</b>';sub.textContent='Crée un code à 4 chiffres (toi seul le connais)';}
 else if(mode==='confirm'){ttl.innerHTML='Confirme ton <b>code</b>';sub.textContent='Retape le même code';}
 else {ttl.innerHTML='Cockpit <b>privé</b>';sub.textContent='Entre ton code';} drawDots(); }
const keys=['1','2','3','4','5','6','7','8','9','effacer','0','ok'];
keys.forEach(k=>{const b=document.createElement('div');b.className='key'+(/[a-z]/.test(k)?' fn':'');b.textContent=k==='effacer'?'⌫':(k==='ok'?'OK':k);
 b.onclick=()=>{b.classList.add('act');setTimeout(()=>b.classList.remove('act'),120);
  if(k==='effacer'){buf=buf.slice(0,-1);msg.textContent='';drawDots();return;}
  if(k==='ok'){submit();return;}
  if(buf.length<len){buf+=k;drawDots(); if(buf.length===len) setTimeout(submit,150);}
 };pad.appendChild(b);});
function fail(t){msg.textContent=t;msg.className='msg err';const g=document.querySelector('.gate');g.classList.add('shake');setTimeout(()=>g.classList.remove('shake'),420);buf="";drawDots();}
function ok(t){msg.textContent=t;msg.className='msg';}
function submit(){ if(buf.length<len){return;}
 if(mode==='create'){ first=buf; buf=""; mode='confirm'; setMode(); }
 else if(mode==='confirm'){ if(buf===first){ localStorage.setItem(KEY,btoa(first)); ok('Code enregistré ✓'); setTimeout(go,500);} else { mode='create'; first=''; setMode(); fail('Les codes ne correspondent pas'); } }
 else { if(btoa(buf)===localStorage.getItem(KEY)){ ok('Bienvenue Kevin'); setTimeout(go,400);} else fail('Code incorrect'); }
}
function go(){ location.href=TARGET; }
setMode();
setTimeout(function(){document.getElementById('splash').classList.add('gone');document.body.classList.add('ready');},3600);
</script>
</body></html>
