<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAÏA">
<title>MAÏA</title>
<link rel="icon" type="image/png" href="https://assistant-ia-vb.github.io/maia-cockpit-assets/maia-icon-192.png">
<link rel="apple-touch-icon" href="https://assistant-ia-vb.github.io/maia-cockpit-assets/maia-icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--bg1:#0c0e12;--surf:#13151b;--surf2:#181b22;--surf3:#1e222b;
  --line:#23262f;--line2:#2d313c;--line3:#383d49;
  --ink:#f4f6fa;--ink2:#b3bcca;--ink3:#828c9c;--ink4:#5a6273;
  --accent:#5b7cfa;--accent2:#8aa0ff;--accent-soft:rgba(91,124,250,.15);--accent-line:rgba(91,124,250,.45);
  --green:#34c98a;--green-soft:rgba(52,201,138,.14);--green-line:rgba(52,201,138,.42);
  --amber:#e6a93c;--amber-soft:rgba(230,169,60,.14);--amber-line:rgba(230,169,60,.42);
  --red:#ef5d6b;--red-soft:rgba(239,93,107,.14);--red-line:rgba(239,93,107,.42);
  --violet:#a98bff;--violet-soft:rgba(169,139,255,.14);
  --rad:14px;--rad-sm:10px;--rad-lg:20px;
  --sh:0 1px 2px rgba(0,0,0,.4);--sh2:0 18px 50px -24px rgba(0,0,0,.85);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:radial-gradient(1000px 540px at 86% -12%,#11151f 0,transparent 60%),radial-gradient(820px 460px at -8% 2%,#0e131c 0,transparent 55%),var(--bg);
  color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.02em}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#20242e;border-radius:8px}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.svgi{display:inline-block;vertical-align:middle;width:18px;height:18px;flex:none;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* shell */
.app{display:grid;grid-template-columns:1fr;min-height:100vh}
.rail{display:none}
.main{width:100%;max-width:620px;margin:0 auto;padding:0 18px 130px}
.topbar{display:flex;align-items:center;gap:11px;padding:20px 2px 6px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 66%,transparent)}
.wm{display:flex;align-items:center;gap:10px}
.wm .mk{width:24px;height:24px}
.wm .nm{font-size:19px;font-weight:800;letter-spacing:.18em;color:var(--ink)}
.greet{margin:14px 2px 4px}
.greet .eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent2)}
.greet h1{font-size:23px;font-weight:800;margin-top:7px;letter-spacing:-.025em}
.greet p{font-size:14px;color:var(--ink3);margin:5px 0 0}

/* section label */
.sec{display:flex;align-items:center;gap:10px;margin:26px 2px 13px}
.sec .t{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.sec .ln{flex:1;height:1px;background:var(--line)}
.sec .c{font-size:11px;font-weight:700;color:var(--ink2);background:var(--surf2);border:1px solid var(--line);border-radius:999px;padding:1px 9px}

/* urgency pill */
.urg{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.urg .dot{width:8px;height:8px;border-radius:50%}
.urg-urgent{color:#ff97a0}.urg-urgent .dot{background:var(--red);box-shadow:0 0 0 4px var(--red-soft)}
.urg-important{color:#f0c074}.urg-important .dot{background:var(--amber);box-shadow:0 0 0 4px var(--amber-soft)}
.urg-tranquille{color:#86e7bb}.urg-tranquille .dot{background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}

/* decision card */
.dcard{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:17px;margin-bottom:13px;box-shadow:var(--sh)}
.dcard.hero{border-color:var(--line2);border-radius:var(--rad-lg);padding:20px;background:linear-gradient(155deg,#161b29 0,#12141b 62%);box-shadow:var(--sh2);position:relative;overflow:hidden}
.dcard.hero:before{content:"";position:absolute;right:-70px;top:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(closest-side,rgba(91,124,250,.2),transparent);pointer-events:none}
.dcard.focus{border-color:var(--accent-line);box-shadow:0 0 0 3px var(--accent-soft)}
.heroeye{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--accent2);margin-bottom:12px}
.heroeye .svgi{width:15px;height:15px}
.dttl{font-size:18px;font-weight:750;line-height:1.3;letter-spacing:-.02em}
.dcard.hero .dttl{font-size:21px}
.dtop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.dwhy{font-size:14px;color:var(--ink2);line-height:1.6;margin:9px 0 0}
.dreco{display:flex;gap:9px;align-items:flex-start;margin-top:13px;font-size:14px;color:#dbe3f7;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:12px;padding:12px 13px;line-height:1.5}
.dreco .svgi{width:17px;height:17px;color:var(--accent2);margin-top:1px}
.dreco b{color:#fff;font-weight:650}

/* buttons */
.acts{display:flex;flex-wrap:wrap;gap:9px;margin-top:15px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line2);background:var(--surf2);color:var(--ink);
  border-radius:12px;padding:13px 17px;font-size:15px;font-weight:650;cursor:pointer;transition:transform .07s,background .14s,border-color .14s,box-shadow .14s;font-family:inherit}
.btn:hover{border-color:var(--line3);background:var(--surf3)}.btn:active{transform:translateY(1px)}
.btn .svgi{width:18px;height:18px}
.btn.primary{flex:1 1 auto;min-width:150px;background:linear-gradient(180deg,#6884fb,#4f6ef2);border-color:#6c87ff;color:#fff;
  box-shadow:0 10px 26px -12px rgba(91,124,250,.95),inset 0 1px 0 rgba(255,255,255,.18);font-size:16px;font-weight:700;padding:15px 18px}
.btn.primary:hover{background:linear-gradient(180deg,#7790ff,#5878f6)}
.btn.quiet{background:transparent;color:var(--ink2);border-color:var(--line2)}
.btn.quiet:hover{color:var(--ink);border-color:var(--line3)}
.btn.block{width:100%}
.btn.ok{background:var(--green-soft);border-color:var(--green-line);color:#86e7bb;font-weight:650}.btn.ok:hover{background:rgba(52,201,138,.2);border-color:var(--green-line)}

/* explain */
.explain{margin-top:14px;border:1px solid var(--line);border-radius:12px;background:var(--bg1);overflow:hidden}
.explain .er{display:flex;gap:11px;padding:13px 14px;border-top:1px solid var(--line);font-size:13.5px;line-height:1.55;color:var(--ink2)}
.explain .er:first-child{border-top:0}
.explain .er .svgi{width:17px;height:17px;margin-top:1px;flex:none}
.explain .er b{display:block;color:var(--ink);font-weight:650;font-size:12px;letter-spacing:.02em;text-transform:uppercase;margin-bottom:2px;color:var(--ink3)}
.er.q .svgi{color:var(--ink3)}.er.s .svgi{color:#f0a}.er.s .svgi{color:var(--red)}.er.m .svgi{color:var(--green)}.er.v .svgi{color:var(--accent2)}

/* confirm */
.confirm{margin-top:14px;border:1px solid var(--green-line);background:var(--green-soft);border-radius:13px;padding:15px}
.confirm.amber{border-color:var(--amber-line);background:var(--amber-soft)}
.confirm .ch{display:flex;gap:10px;align-items:flex-start}
.confirm .ch .svgi{width:21px;height:21px;flex:none;color:#86e7bb;margin-top:1px}
.confirm.amber .ch .svgi{color:#f0c074}
.confirm .cmsg{font-size:15px;font-weight:650;color:var(--ink);line-height:1.45}
.confirm .csuite{font-size:13.5px;color:var(--ink2);margin-top:6px;line-height:1.55}
.steps{margin:13px 0 0;padding:0;list-style:none;counter-reset:s}
.steps li{counter-increment:s;display:flex;gap:11px;align-items:flex-start;font-size:14px;color:var(--ink);padding:7px 0;line-height:1.5}
.steps li:before{content:counter(s);flex:none;width:24px;height:24px;border-radius:50%;background:var(--surf3);border:1px solid var(--line2);color:var(--ink2);font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.cfoot{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:13px}
.statline{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink2)}
.statline .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.undo{font-size:13px;font-weight:600;color:var(--ink3);background:none;border:0;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:4px;font-family:inherit;margin-left:auto}
.undo:hover{color:var(--ink)}
details.tech{margin-top:12px;border-top:1px dashed var(--line2);padding-top:10px}
details.tech summary{font-size:12.5px;color:var(--ink3);cursor:pointer;list-style:none;display:flex;align-items:center;gap:7px}
details.tech summary::-webkit-details-marker{display:none}
details.tech summary .svgi{width:14px;height:14px}
details.tech[open] summary{color:var(--ink2);margin-bottom:9px}
.techbody{font-size:12.5px;color:var(--ink3);line-height:1.6}
.techbody .kv{margin:7px 0}.techbody .kv b{color:var(--ink2);font-weight:600}
.techbody pre{white-space:pre-wrap;word-break:break-word;background:#070a10;border:1px solid var(--line2);border-radius:10px;padding:11px;color:#cdd9ee;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;line-height:1.55;margin:8px 0 0}

/* simple rows (attend / gère / bloqué) */
.row{display:flex;align-items:center;gap:13px;padding:14px;border:1px solid var(--line);border-radius:var(--rad);background:var(--surf);margin-bottom:10px;cursor:pointer;transition:background .12s,border-color .12s;text-align:left;width:100%;font-family:inherit}
.row:hover{background:var(--surf2);border-color:var(--line2)}
.row.calm{cursor:default}.row.calm:hover{background:var(--surf);border-color:var(--line)}
.row .ic{width:36px;height:36px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;border:1px solid var(--line2)}
.row .ic.maia{background:var(--violet-soft);color:var(--violet)}
.row .ic.wait{background:var(--accent-soft);color:var(--accent2)}
.row .ic.block{background:var(--red-soft);color:#ff97a0}
.row .ic .svgi{width:18px;height:18px}
.row .tx{flex:1;min-width:0}
.row .tx b{display:block;font-size:14.5px;font-weight:650;color:var(--ink)}
.row .tx small{display:block;font-size:12.5px;color:var(--ink3);margin-top:2px;line-height:1.45}
.row .rt{flex:none;display:flex;align-items:center;gap:9px}
.row .rt .urg{font-size:10px}
.row .chev{color:var(--ink4);width:18px;height:18px}
.row .donetag{font-size:11px;font-weight:700;color:#86e7bb;background:var(--green-soft);border:1px solid var(--green-line);border-radius:7px;padding:3px 8px}
.row .latertag{font-size:11px;font-weight:700;color:var(--ink3);background:var(--surf2);border:1px solid var(--line);border-radius:7px;padding:3px 8px}

.calmnote{display:flex;gap:11px;align-items:center;justify-content:center;text-align:center;color:var(--ink3);font-size:13.5px;padding:22px 16px;border:1px dashed var(--line2);border-radius:var(--rad);margin-top:4px}
.calmnote .svgi{width:18px;height:18px;color:var(--green)}
.reassure{text-align:center;color:var(--ink4);font-size:13px;margin:30px 8px 6px;line-height:1.6}

/* views + nav */
.view{display:none}.view.on{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.viewhead{padding:16px 2px 2px}
.viewhead h2{font-size:21px;font-weight:800;letter-spacing:-.025em}
.viewhead p{font-size:13.5px;color:var(--ink3);margin:5px 0 0}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;background:rgba(10,11,14,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 1px 12px;font-size:10.5px;font-weight:600;color:var(--ink4);background:none;border:0;cursor:pointer;position:relative;font-family:inherit}
.tabbar button .svgi{width:22px;height:22px}
.tabbar button.on{color:var(--ink)}
.tabbar button.on:before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:2px;border-radius:2px;background:var(--accent)}
.tabbar button.tech{color:var(--ink4)}.tabbar button.tech.on{color:var(--ink2)}
.tabbar .nb{position:absolute;top:6px;left:calc(50% + 11px);background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:999px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* technique */
.techwrap .tnote{display:flex;gap:11px;align-items:flex-start;font-size:13px;color:var(--ink3);background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:14px;line-height:1.55;margin-bottom:6px}
.techwrap .tnote .svgi{width:17px;height:17px;color:var(--ink4);margin-top:1px}
.tcard{border:1px solid var(--line);border-radius:var(--rad);background:var(--surf);padding:15px;margin-bottom:11px}
.tcard h4{font-size:13px;font-weight:700;color:var(--ink2);letter-spacing:.02em;margin-bottom:10px;text-transform:uppercase;font-size:11px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tcell{border:1px solid var(--line);border-radius:10px;padding:11px;background:var(--bg1)}
.tcell .v{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700}
.tcell.ok .v{color:#86e7bb}.tcell.ko .v{color:#ff97a0}
.tcell .v .svgi{width:14px;height:14px}.tcell .k{font-size:11.5px;color:var(--ink3);margin-top:4px;line-height:1.4}
.tline{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--line);font-size:13px}
.tline:first-child{border-top:0}.tline span:first-child{color:var(--ink3)}.tline span:last-child{color:var(--ink2);text-align:right}
.trefresh{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:#cdd7ff;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:9px;padding:8px 12px;cursor:pointer;font-family:inherit;font-weight:600;margin-top:6px}
.treset{font-size:12px;color:var(--ink4);background:none;border:0;cursor:pointer;text-decoration:underline;font-family:inherit;padding:4px;margin-top:8px}

/* toast */
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(8px);background:var(--surf3);color:var(--ink);border:1px solid var(--line3);
  padding:12px 17px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--sh2);opacity:0;transition:.22s;pointer-events:none;z-index:95;display:flex;align-items:center;gap:9px;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .svgi{width:17px;height:17px;color:var(--green)}

@media (min-width:860px){
  .app{grid-template-columns:248px 1fr}
  .rail{display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:24px 16px;border-right:1px solid var(--line);background:linear-gradient(180deg,var(--bg1),var(--bg))}
  .rail .wm{padding:4px 8px 0}
  .rail nav{display:flex;flex-direction:column;gap:4px;margin-top:30px}
  .rail nav button{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:11px;font-size:14.5px;font-weight:600;color:var(--ink3);cursor:pointer;background:none;border:0;text-align:left;font-family:inherit;position:relative;width:100%}
  .rail nav button .svgi{width:19px;height:19px}
  .rail nav button:hover{background:var(--surf);color:var(--ink2)}
  .rail nav button.on{background:var(--surf2);color:var(--ink)}
  .rail nav button.on:before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--accent)}
  .rail nav button.tech{margin-top:10px;color:var(--ink4);font-size:13px}
  .rail nav button .nb{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:800;border-radius:999px;min-width:19px;height:19px;display:flex;align-items:center;justify-content:center;padding:0 5px}
  .topbar,.tabbar{display:none}
  .main{max-width:640px;padding:14px 30px 70px}
  .tgrid{gap:11px}
}
/* ===== suite (post-validation honnête) ===== */
.suite{margin-top:14px;border:1px solid var(--green-line);background:var(--green-soft);border-radius:14px;padding:16px}
.suite.amber{border-color:var(--amber-line);background:var(--amber-soft)}
.suite.mut{border-color:var(--line2);background:var(--surf2)}
.suite .sline{display:flex;gap:10px;align-items:flex-start;font-size:15px;color:var(--ink);line-height:1.45}
.suite .sline .svgi{width:21px;height:21px;flex:none;margin-top:1px;color:#86e7bb}
.suite.amber .sline .svgi{color:#f0c074}.suite.mut .sline .svgi{color:var(--ink3)}
.suite .sline b{font-weight:700}
.statebanner{display:inline-flex;align-items:center;gap:8px;margin-top:13px;font-size:12.5px;font-weight:600;color:#f0c074;background:var(--amber-soft);border:1px solid var(--amber-line);border-radius:999px;padding:6px 13px}
.statebanner .sb-dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}.statebanner b{font-weight:800}
.clarity{margin-top:13px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--bg1)}
.clarity .cl{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:11px 13px;border-top:1px solid var(--line);font-size:13px}
.clarity .cl:first-child{border-top:0}
.clarity .cl span{color:var(--ink3)}
.clarity .cl b{font-weight:650;text-align:right}
.clarity .cl b.no{color:#ff97a0}.clarity .cl b.yes{color:#86e7bb}.clarity .cl b.soon{color:#f0c074}
.snote{display:flex;gap:9px;align-items:flex-start;margin-top:12px;font-size:13px;color:var(--ink2);line-height:1.5}
.snote .svgi{width:16px;height:16px;flex:none;margin-top:2px;color:var(--ink3)}
.snote.strong{color:var(--ink);font-weight:600;background:var(--red-soft);border:1px solid var(--red-line);border-radius:11px;padding:11px 13px}
.snote.strong .svgi{color:#ff97a0}
.snext{display:flex;gap:9px;align-items:flex-start;margin-top:10px;font-size:13.5px;color:var(--ink2);line-height:1.5}
.snext .svgi{width:16px;height:16px;flex:none;margin-top:2px;color:var(--ink3)}
.missionbox{margin-top:13px;border:1px solid var(--line2);border-radius:11px;background:#070a10;overflow:hidden}
.missionbox .mbh{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink3);padding:11px 13px 0}
.missionbox pre{margin:6px 0 0;padding:9px 13px 13px;white-space:pre-wrap;word-break:break-word;color:#cdd9ee;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.55}
.statline.ok{color:#86e7bb}.statline.amber{color:#f0c074}.statline.mut{color:var(--ink3)}.statline.ok .dot{background:var(--green)}
</style></head>
<body>
<div class="app">
  <aside class="rail">
    <div class="wm">
      <svg class="mk" viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M16 2.5 28 9v14L16 29.5 4 23V9z" stroke="#5b7cfa" stroke-width="1.4" opacity=".55"/><path d="M16 9.5 22 13v6l-6 3.5-6-3.5v-6z" fill="#5b7cfa" fill-opacity=".16" stroke="#8aa0ff" stroke-width="1.3"/><circle cx="16" cy="16" r="1.7" fill="#cdd7ff"/></svg>
      <span class="nm">MAÏA</span>
    </div>
    <nav id="railnav"></nav>
  </aside>

  <main class="main">

      +'<div class="cl"><span>À toi de jouer&nbsp;?</span><b class="soon">Rien pour l\'instant</b></div>'
      +'<div class="cl"><span>Ensuite</span><b>Tu donnes l\'autorisation, quand tu veux</b></div></div>'
      +'<div class="snote">'+svg("eye")+'<span>Tant que tu n\'as pas autorisé, je ne vois aucun mail.</span></div>'
      +'<div class="cfoot"><span class="statline"><span class="dot"></span>Noté</span>'
      +'<button class="undo" data-act="undo" data-id="'+d.id+'">Revenir en arrière</button></div></div>';
  }
  var hp='<div class="suite"><div class="sline">'+svg("checkc")+'<div><b>C\'est noté. J\'ai préparé la mission pour Claude.</b></div></div>'
    +'<div class="statebanner"><span class="sb-dot"></span>Préparé — <b>pas encore lancé</b></div>'
    +'<div class="clarity">'
    +'<div class="cl"><span>Exécuté maintenant&nbsp;?</span><b class="no">Non</b></div>'
    +'<div class="cl"><span>Mission préparée&nbsp;?</span><b class="yes">Oui</b></div>'
    +'<div class="cl"><span>Claude prévenu&nbsp;?</span><b class="soon">Pas encore</b></div>'
    +'<div class="cl"><span>À toi de jouer&nbsp;?</span><b class="yes">Transmettre la mission à Claude</b></div>'
    +'<div class="cl"><span>Ensuite</span><b>Claude s\'en occupe et te montre le résultat</b></div></div>'
    +'<div class="snote strong">'+svg("alert")+'<span>Rien n\'est lancé tant que tu n\'as pas transmis la mission à Claude.</span></div>';
  if(MISSION_OPEN[d.id]) hp+='<div class="missionbox"><div class="mbh">Mission pour Claude</div><pre>'+esc(d.tech?d.tech.instruction:"")+'</pre></div>';
  hp+='<div class="acts" style="margin-top:14px">'
    +'<button class="btn primary" data-act="copier" data-id="'+d.id+'">'+svg("copy")+'Copier la mission pour Claude</button>'
    +'<button class="btn quiet" data-act="mission" data-id="'+d.id+'">'+svg("eye")+(MISSION_OPEN[d.id]?"Masquer":"Voir la mission")+'</button></div>'
    +'<div class="cfoot" style="margin-top:12px"><button class="btn ok" data-act="transmis" data-id="'+d.id+'">'+svg("send")+'J\'ai transmis à Claude</button>'
    +'<button class="undo" data-act="undo" data-id="'+d.id+'">Revenir en arrière</button></div></div>';
  return hp;
}

/* actions */
function doAct(id,act){
  var d=decById(id); if(!d){toast("Action introuvable","alert");return;}
  if(act==="explain"){EXPL[id]=!EXPL[id];renderAll();return;}
  if(act==="mission"){MISSION_OPEN[id]=!MISSION_OPEN[id];renderAll();scrollToCard(id);return;}
  if(act==="nextHero"){var mp=(D.decisions||[]).filter(function(x){return st(x.id)==="pending";}).sort(decOrder);HEROID=mp.length?mp[0].id:null;renderAll();window.scrollTo(0,0);return;}
  if(act==="valider"){setSt(id,"accepted");EXPL[id]=false;toast(d.kind==="guide"?"Voici les étapes":d.kind==="decide"?"C'est noté":"Mission préparée pour Claude");renderAll();scrollToCard(id);return;}
  if(act==="copier"){copyText(d.tech?d.tech.instruction:"");MISSION_OPEN[id]=true;renderAll();scrollToCard(id);return;}
  if(act==="transmis"){setSt(id,"transmis");MISSION_OPEN[id]=false;toast("Marqué comme transmis à Claude","send");renderAll();return;}
  if(act==="later"){setSt(id,"later");EXPL[id]=false;toast("Reporté — je te le represente plus tard","clock");renderAll();return;}
  if(act==="done"){setSt(id,"done");toast("Bravo, c'est réglé");renderAll();return;}
  if(act==="undo"){clearSt(id);MISSION_OPEN[id]=false;toast("Revenu en arrière");renderAll();return;}
}
function scrollToCard(id){setTimeout(function(){var el=document.querySelector('[data-card="'+id+'"]');if(el&&el.scrollIntoView)el.scrollIntoView({block:"nearest",behavior:"smooth"});},60);}

/* ordering: urgent first, pending before resolved */
var URGRANK={urgent:0,important:1,tranquille:2};
function decOrder(a,b){
  var pa=st(a.id)==="pending"?0:1, pb=st(b.id)==="pending"?0:1;
  if(pa!==pb)return pa-pb;
  function ru(u){return URGRANK[u]==null?3:URGRANK[u];}
  return ru(a.urg)-ru(b.urg);
}
function topDecision(){
  var pend=(D.decisions||[]).filter(function(d){return st(d.id)==="pending";}).sort(decOrder);
  return pend[0]||null;
}

/* ===== HOME ===== */
var FOCUS=null;
var HEROID=null;
function renderHome(){
  var dt=new Date();
  document.getElementById("date").textContent=dt.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  if(HEROID&&!decById(HEROID))HEROID=null;
  if(!HEROID){var t0=topDecision();HEROID=t0?t0.id:null;}
  var heroD=HEROID?decById(HEROID):null;
  var pendCount=(D.decisions||[]).filter(function(d){return st(d.id)==="pending";}).length;
  document.getElementById("sub").textContent = pendCount? ("Voici ce qui compte vraiment aujourd'hui.") : ("Tout est sous contrôle. Rien ne réclame ton attention.");
  /* hero */
  document.getElementById("heroWrap").innerHTML = heroD ? decisionHtml(heroD,true)
    : '<div class="dcard hero"><div class="heroeye">'+svg("checkc")+'Tout est à jour</div><div class="dttl">Tu es à jour.</div><div class="dwhy">Je m\'occupe du reste en coulisses. Tu peux fermer l\'application.</div></div>';
  /* ça attend aussi (other pending, excluding hero) */
  var others=(D.decisions||[]).filter(function(d){return st(d.id)==="pending" && d.id!==HEROID;}).sort(decOrder);
  document.getElementById("secWait").style.display=others.length?"":"none";
  document.getElementById("waitN").textContent=others.length;
  document.getElementById("waitList").innerHTML=others.map(function(d){
    return '<button class="row" data-go="'+d.id+'"><div class="ic wait">'+svg("arrow")+'</div>'
      +'<div class="tx"><b>'+esc(d.titre)+'</b><small>'+esc(d.reco)+'</small></div>'
      +'<div class="rt">'+urgPill(d.urg)+svg("chev","chev")+'</div></button>';
  }).join("");
  /* ce que je gère sans toi */
  var _trans=(D.decisions||[]).filter(function(d){return st(d.id)==="transmis";}).map(function(d){return '<div class="row calm"><div class="ic wait">'+svg("send")+'</div><div class="tx"><b>Claude s\'en occupe : '+esc(d.titre)+'</b><small>En attente de son retour.</small></div></div>';}).join("");
  document.getElementById("manageList").innerHTML=_trans+(D.managed||[]).map(function(m){
    return '<div class="row calm"><div class="ic maia">'+svg("spark")+'</div><div class="tx"><b>'+esc(m.titre)+'</b><small>'+esc(m.detail)+'</small></div></div>';
  }).join("");
  /* bloqué (resolved 'later' items shown as gentle reminder, or none) */
  var laters=(D.decisions||[]).filter(function(d){return st(d.id)==="later";});
  document.getElementById("secBlock").style.display=laters.length?"":"none";
  document.getElementById("blockList").innerHTML=laters.length? laters.map(function(d){
    return '<button class="row" data-go="'+d.id+'"><div class="ic block">'+svg("clock")+'</div>'
      +'<div class="tx"><b>'+esc(d.titre)+'</b><small>Tu l\'as reporté — j\'attends que tu sois prêt.</small></div>'
      +'<div class="rt"><span class="latertag">Reporté</span>'+svg("chev","chev")+'</div></button>';
  }).join("") : "";
  /* reassurance */
  document.getElementById("reassure").innerHTML = pendCount ? "" : (svg("leaf")+" Tu peux fermer, je veille.");
  bindHome();
}
function bindHome(){
  document.querySelectorAll("#heroWrap [data-act], #heroWrap .undo").forEach(bindAct);
  document.querySelectorAll("#waitList [data-go], #blockList [data-go]").forEach(function(b){
    b.onclick=function(){FOCUS=b.getAttribute("data-go");go("trancher");};
  });
}
function bindAct(b){b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();doAct(b.getAttribute("data-id"),b.getAttribute("data-act"));};}

/* ===== À TRANCHER ===== */
function renderTrancher(){
  var list=(D.decisions||[]).slice().sort(decOrder);
  document.getElementById("trancherList").innerHTML=list.length?list.map(function(d){return decisionHtml(d,false);}).join("")
    : '<div class="calmnote">'+svg("checkc")+'Rien à trancher. Tout est à jour.</div>';
  document.querySelectorAll("#v-trancher [data-act], #v-trancher .undo").forEach(bindAct);
  if(FOCUS){scrollToCard(FOCUS);var f=FOCUS;setTimeout(function(){FOCUS=null;},1400);}
  /* nav badge */
  var pend=(D.decisions||[]).filter(function(d){return st(d.id)==="pending";}).length;
  document.querySelectorAll("[data-badge]").forEach(function(x){x.textContent=pend||"";x.style.display=pend?"":"none";});
}

/* ===== TECHNIQUE ===== */
function renderTech(){
  var t=D.tech||{};var m=D.meta||{};
  var h='<div class="tnote">'+svg("gear")+'<span>'+esc(t.note||"")+'</span></div>';
  h+='<div class="tcard"><h4>Version & données</h4>'
    +'<div class="tline"><span>Version active</span><span>MAÏA '+esc(m.version||"")+'</span></div>'
    +'<div class="tline"><span>Mis à jour</span><span>'+esc(new Date(m.updated_ts).toLocaleString("fr-FR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}))+'</span></div>'
    +'<div class="tline"><span>Sources</span><span>'+esc(t.sources||"")+'</span></div>'
    +'<div class="tline"><span>État des données</span><span>'+esc(t.note_donnees||"")+'</span></div>'
    +'<div><button class="trefresh" id="techRefresh">'+svg("spinner")+'Rafraîchir les données</button></div>'
    +'</div>';
  if(t.hermes&&t.hermes.length){
    h+='<div class="tcard"><h4>Transport entre outils</h4><div class="tgrid">'
      +t.hermes.map(function(x){return '<div class="tcell '+(x.ok?"ok":"ko")+'"><div class="v">'+svg(x.ok?"checkc":"x")+esc(x.v)+'</div><div class="k">'+esc(x.k)+'</div></div>';}).join("")
      +'</div></div>';
  }
  if(t.exchanges&&t.exchanges.length){
    h+='<div class="tcard"><h4>Échanges en coulisses</h4>'
      +t.exchanges.map(function(x){return '<div class="tline"><span>'+esc(x.sujet)+'</span><span>'+esc(x.etat)+'</span></div>';}).join("")
      +'</div>';
  }
  h+='<div style="text-align:center"><button class="treset" id="techReset">Réinitialiser l\'état local de cet appareil</button></div>';
  document.getElementById("techWrap").innerHTML=h;
  var r=document.getElementById("techRefresh");if(r)r.onclick=function(){loadSnapshot(false);};
  var rs=document.getElementById("techReset");if(rs)rs.onclick=function(){if(confirm("Remettre à zéro tes choix sur cet appareil ?")){STATE={};lsSet(STATE);EXPL={};toast("Remis à zéro");renderAll();}};
}

/* ===== NAV ===== */
var NAV=[["home","Aujourd'hui","home"],["trancher","À trancher","list"],["tech","Technique","gear"]];
function buildNav(){
  document.getElementById("tabbar").innerHTML=NAV.map(function(n){
    return '<button data-v="'+n[0]+'" class="'+(n[0]==="tech"?"tech":"")+'">'+svg(n[2])+esc(n[1])+(n[0]==="trancher"?'<span class="nb" data-badge style="display:none"></span>':'')+'</button>';
  }).join("");
  document.getElementById("railnav").innerHTML=NAV.map(function(n){
    return '<button data-v="'+n[0]+'" class="'+(n[0]==="tech"?"tech":"")+'">'+svg(n[2])+'<span>'+esc(n[1])+'</span>'+(n[0]==="trancher"?'<span class="nb" data-badge style="display:none"></span>':'')+'</button>';
  }).join("");
  document.querySelectorAll("[data-v]").forEach(function(b){b.onclick=function(){go(b.getAttribute("data-v"));};});
}
function go(v){
  document.querySelectorAll(".view").forEach(function(s){s.classList.remove("on");});
  var el=document.getElementById("v-"+v);if(el)el.classList.add("on");
  document.querySelectorAll("[data-v]").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-v")===v);});
  if(v==="trancher")renderTrancher();
  if(v==="tech")renderTech();
  if(v==="home")renderHome();
  window.scrollTo(0,0);
}

function renderAll(){renderHome();renderTrancher();}

/* semi-live (silent) */
function loadSnapshot(initial){
  fetch(SNAP_URL,{cache:"no-store"}).then(function(r){return r.json();}).then(function(j){
    if(j&&j.decisions){D=j;renderAll();var tv=document.getElementById("v-tech");if(tv&&tv.classList.contains("on"))renderTech();if(!initial)toast("Données rafraîchies","spinner");}
  }).catch(function(){if(!initial)toast("Pas de réseau — j'affiche le dernier état connu","alert");});
}

buildNav();
renderAll();
go("home");
loadSnapshot(true);
</script>
</body></html>
